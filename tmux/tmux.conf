#download other plugins with some easy keybinds
set -g @plugin 'tmux-plugins/tpm'
# fix tmux defaults to sensible
set -g @plugin 'tmux-plugins/tmux-sensible'
#if computer crashes, this saves the files in the file system
set -g @plugin 'tmux-plugins/tmux-resurrect'
# make tmux session creation faster
set -g @plugin 'omerxx/tmux-sessionx'


# vim-style copy-mode
set -g mode-keys vi

# yank to X11 clipboard
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# never translate wheel to arrow keys
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# semantic “cop” operator
bind-key -T root User1 {
  display-message "cop invoked"
  copy-mode -e
  send-keys -X previous-prompt
  send-keys -X begin-selection
  send-keys -X next-prompt
  send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}

# binding the shortcut prefix t to the cop operator
unbind-key -T prefix t
bind-key -T prefix t send-keys -K User1

# toggle to previously used window
bind-key ^ last-window

# pane navigation (vim-style)
bind-key h select-pane -L
bind-key l select-pane -R

# make sourcing easier
bind-key r source-file ~/.tmux.conf \; display-message "tmux reloaded"

### adding the VIM keys to copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

## add the plugin installation
run '~/.tmux/plugins/tpm/tpm'
